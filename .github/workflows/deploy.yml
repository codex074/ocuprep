name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]   # deploy อัตโนมัติเมื่อ push
  workflow_dispatch:            # deploy ด้วยตนเองจาก GitHub UI ได้

permissions:
  contents: write   # จำเป็นสำหรับ gh-pages push

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true    # เก็บ gh-pages branch ให้สะอาด
